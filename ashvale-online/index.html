<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashvale Online</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="game">

        <!-- Castle -->
        <div class="castle">
            <div class="tower left-tower"></div>
            <div class="tower right-tower"></div>

            <div class="castle-wall"></div>

            <div class="castle-door">
                🚪
            </div>
        </div>


        <!-- Paths -->
        <div class="path main-path"></div>


        <!-- Trees -->
        <div class="tree tree1">
            🌳
        </div>

        <div class="tree tree2">
            🌳
        </div>

        <div class="tree tree3">
            🌳
        </div>


        <!-- Player -->
        <div id="player">
            🧍
        </div>


        <!-- UI -->
        <div id="interface">

            <div class="status">
                ❤️ HP: 100
            </div>

            <div class="skill">
                🪓 Woodcutting: Level 1
            </div>

        </div>


    </div>


<script src="script.js"></script>

</body>
</html>
